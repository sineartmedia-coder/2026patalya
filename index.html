<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="netflix-container">
        <header>
            <div class="logo">
                <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/logo%402x.png" class="netflix-logo" width="111" alt="Netflix">
            </div>
        </header>

        <main class="profiles-screen">
            <h1>Kim İzliyor?</h1>
            
            <div class="profiles-container">
                <!-- 1. Taşpınar Ailesi (Pink, Clickable) -->
                <div class="profile clickable" onclick="window.location.href='home.html'">
                    <div class="avatar pink">
                        <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/gu%CC%88lu%CC%88cu%CC%88k%402x.png" class="smiley" alt="Smiley">
                    </div>
                    <span class="profile-name">Taşpınar Ailesi</span>
                </div>

                <!-- 2. Ajanst (Green, Locked) -->
                <div class="profile locked">
                    <div class="avatar green">
                        <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/gu%CC%88lu%CC%88cu%CC%88k%402x.png" class="smiley" alt="Smiley">
                    </div>
                    <span class="profile-name">Ajanst</span>
                    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0110 0v4"></path>
                    </svg>
                </div>

                <!-- 3. Üst Yönetim (Blue, Locked) -->
                <div class="profile locked">
                    <div class="avatar blue">
                        <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/gu%CC%88lu%CC%88cu%CC%88k%402x.png" class="smiley" alt="Smiley">
                    </div>
                    <span class="profile-name">Üst Yönetim</span>
                    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0110 0v4"></path>
                    </svg>
                </div>

                <!-- 4. Saha Ekibi (Purple) -->
                <div class="profile locked">
                    <div class="avatar purple">
                        <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/gu%CC%88lu%CC%88cu%CC%88k%402x.png" class="smiley" alt="Smiley">
                    </div>
                    <span class="profile-name">Saha Ekibi</span>
                </div>

                <!-- 5. Müşteriler (Yellow) -->
                <div class="profile locked">
                    <div class="avatar yellow">
                        <img src="https://raw.githubusercontent.com/sineartmedia-coder/glosst/main/gu%CC%88lu%CC%88cu%CC%88k%402x.png" class="smiley" alt="Smiley">
                    </div>
                    <span class="profile-name">Müşteriler</span>
                </div>
            </div>

            <button class="manage-profiles">Profil Yönetimi</button>
        </main>
    </div>
</body>
</html>
